# prmana-scim configuration example
#
# Copy to /etc/prmana/scim.yaml and edit before starting prmana-scim.service.
#
# References:
#   SCIM 2.0 (RFC 7642, RFC 7643, RFC 7644)
#   docs/storage-architecture.md

# SCIM server listen address
listen: "0.0.0.0:8080"

# OIDC issuer used to validate inbound SCIM bearer tokens.
# Must match the issuer URL configured in your IdP's SCIM provisioning app.
issuer: "https://your-idp.example.com"

# Audience for inbound SCIM bearer tokens.
audience: "prmana-scim"

# prmana-agent socket path (for syncing group memberships via the agent).
agent_socket: "/run/prmana/agent.sock"

# SCIM provisioning targets — map IdP groups to local Unix groups.
# groups:
#   - idp_group: "engineering"
#     local_group: "engineering"
#   - idp_group: "ops"
#     local_group: "ops"

# TLS (recommended for production)
# tls:
#   cert: /etc/prmana/scim-tls.crt
#   key: /etc/prmana/scim-tls.key
