# unix-oidc Policy Configuration Example
# Copy to /etc/unix-oidc/policy.yaml and customize for your environment.
#
# For additional templates (failover, multi-IdP, CIBA step-up, privilege policy),
# see deploy/templates/.

# ── Issuers ──────────────────────────────────────────────────────────────────
# Per-issuer configuration. Each issuer must have a unique URL.
# Tokens are validated against the issuer matching the token's `iss` claim.

issuers:
  - issuer_url: "https://keycloak.example.com/realms/corp"
    client_id: "unix-oidc"
    # client_secret: "your-secret-here"  # Uncomment for confidential clients
    dpop_enforcement: strict  # strict | warn | disabled
    # claim_mapping:
    #   username_claim: preferred_username
    #   transforms:
    #     - type: strip_domain
    #       domain: "example.com"
    # acr_mapping:
    #   required_acr: "urn:mfa"
    #   acr_claim: "acr"

# ── Security Modes ───────────────────────────────────────────────────────────
# Enforcement levels for configurable security checks.
# strict: reject on failure. warn: log and allow. disabled: skip check.

security_modes:
  dpop_required: strict       # DPoP proof-of-possession binding
  jti_enforcement: warn       # JTI replay prevention
  amr_enforcement: disabled   # Authentication Methods References
  groups_enforcement: warn    # NSS group membership

# ── Host Classification ──────────────────────────────────────────────────────
# Affects default security posture and Phase 44 command rule matching.

host:
  classification: elevated    # standard | elevated | critical

# ── SSH Login ────────────────────────────────────────────────────────────────

ssh_login:
  # Groups permitted to SSH in. Empty = no restriction (allow all).
  login_groups: []
  # login_groups:
  #   - developers
  #   - sre-team

# ── Sudo Step-Up ─────────────────────────────────────────────────────────────
# Controls privilege escalation policy. Phase 44 adds command-aware rules.

sudo:
  step_up_required: true
  # Phase 44: explicit default action (overrides step_up_required boolean)
  # default_action: step_up    # allow | step_up | deny

  allowed_methods:
    - device_flow    # OAuth 2.0 Device Authorization Grant
    # - push         # CIBA push notification (requires IdP CIBA support)
    # - fido2        # FIDO2/WebAuthn

  challenge_timeout: 120       # seconds

  # Per-method timeout overrides
  method_timeouts:
    fido2: 30
    push: 60
    device_flow: 120

  poll_interval_secs: 5

  # Grace period: reuse a recent step-up for this many seconds.
  # 0 = every sudo requires a fresh challenge.
  grace_period_secs: 300

  # Dry-run mode: log policy decisions without enforcing them.
  # Use during rollout to observe behavior before going live.
  # dry_run: true

  # Command-specific rules (Phase 44). First match wins.
  # If no rule matches, default_action (or step_up_required) applies.
  commands:
    # Read-only commands: allow without step-up
    - name: "safe-status"
      pattern: "systemctl status *"
      action: allow

    - name: "safe-logs"
      pattern: "journalctl *"
      action: allow

    # Service management: require step-up
    - name: "service-restart"
      pattern: "systemctl restart *"
      action: step_up

    # Package management: require step-up
    - name: "package-install"
      pattern: "apt install *"
      action: step_up

    # Dangerous commands: deny
    - name: "deny-reboot-critical"
      pattern: "reboot"
      action: deny
      host_classification: critical

  # Groups permitted to sudo. Empty = no restriction.
  sudo_groups: []
  # sudo_groups:
  #   - sre-team

# ── Break-Glass ──────────────────────────────────────────────────────────────
# Emergency local access when IdP is unavailable.
# MANDATORY for production. See docs/break-glass-validation.md.

break_glass:
  enabled: true
  accounts:
    - breakglass             # Must exist as a local Unix account with password set
  # Require offline TOTP before granting break-glass bypass (Phase 36-02).
  # requires: yubikey_otp
  alert_on_use: true         # Emit BREAK_GLASS_AUTH audit event at CRITICAL severity

# ── Audit ────────────────────────────────────────────────────────────────────

audit:
  log_file: "/var/log/unix-oidc-audit.log"
  syslog: true
