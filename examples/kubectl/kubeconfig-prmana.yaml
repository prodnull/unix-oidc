# Example kubeconfig using prmana-kubectl as exec credential plugin.
#
# Copy to ~/.kube/config or merge with your existing kubeconfig.
# Alternatively, run `prmana-kubectl setup` to merge automatically:
#
#   prmana-kubectl setup \
#     --cluster-id prod \
#     --server https://api.prod.example.com:6443 \
#     --context prod
#
# See: docs/kubectl-setup.md for the complete guide.

apiVersion: v1
kind: Config

clusters:
  - name: prod
    cluster:
      server: https://api.prod.example.com:6443
      # Uncomment and set base64-encoded CA cert if your apiserver uses a
      # self-signed or private CA:
      # certificate-authority-data: <base64-encoded CA cert>

users:
  - name: prmana-prod
    user:
      exec:
        # client.authentication.k8s.io/v1 is the stable API (Kubernetes 1.26+).
        # Do NOT use v1beta1 or v1alpha1 — those versions are deprecated/removed.
        apiVersion: client.authentication.k8s.io/v1

        # prmana-kubectl must be in $PATH.
        # Installed via: sudo apt install prmana-tools
        command: prmana-kubectl

        args:
          - get-token
          - --cluster-id
          - prod

        # IfAvailable: kubectl will use the plugin if it can run interactively
        # (e.g., open browser for device flow). On headless systems kubectl
        # falls back to NeverPrompt behavior.
        # Do NOT use "Always" — it breaks headless environments.
        interactiveMode: IfAvailable

        # provideClusterInfo: false means kubectl does NOT pass cluster CA/server
        # info to the plugin. prmana-kubectl gets the cluster audience from
        # --cluster-id only; it does not need the cluster URL at token time.
        provideClusterInfo: false

contexts:
  - name: prod
    context:
      cluster: prod
      user: prmana-prod

current-context: prod
