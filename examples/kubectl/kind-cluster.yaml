# kind cluster configuration with prmana JWTAuthenticator.
#
# Creates a local Kubernetes cluster that authenticates via prmana's IdP.
# Used by the e2e test: test/kubectl/e2e_kind_test.sh
#
# Prerequisites:
# - kind: https://kind.sigs.k8s.io/
# - prmana-auth-config.yaml alongside this file (see kube-apiserver-auth-config.yaml)
#
# Usage:
#   kind create cluster --name prmana-e2e --config examples/kubectl/kind-cluster.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
    # Mount the prmana auth config into the apiserver container.
    # The path must match the authentication-config flag below.
    extraMounts:
      - hostPath: ./prmana-auth-config.yaml
        containerPath: /etc/kubernetes/pki/prmana-auth-config.yaml

    # Configure kube-apiserver to use prmana's JWTAuthenticator.
    # kubeadm applies these patches when bootstrapping the cluster.
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            # Activates the structured AuthenticationConfiguration.
            # Mutually exclusive with --oidc-* legacy flags.
            authentication-config: /etc/kubernetes/pki/prmana-auth-config.yaml

# Default networking — use the default API server port.
# Uncomment to use a specific port:
# networking:
#   apiServerPort: 6443
