# prmana: JTI replay protection and DPoP nonce directories
#
# Creates /run/prmana/jti and /run/prmana/nonce on boot and cleans
# expired entries on a schedule.
#
# Install:  cp contrib/systemd/prmana.tmpfiles.conf /etc/tmpfiles.d/prmana.conf
# Apply:    systemd-tmpfiles --create /etc/tmpfiles.d/prmana.conf
#
# References:
#   systemd.tmpfiles(5)
#   RFC 9449 §8 — DPoP Nonce (60s TTL → 5m cleanup window)
#   T-30-01: directory permissions 0750 root:root prevent tampering
#   T-30-02: age-based cleanup prevents unbounded directory growth
#
# Type  Path                    Mode  User   Group  Age  Argument
d       /run/prmana             0750  root   root   -    -
d       /run/prmana/jti         0750  root   root   -    -
d       /run/prmana/nonce       0750  root   root   -    -

# Clean JTI files older than 4 hours.
# Rationale: exceeds the longest expected access token lifetime (typically
# 1h for Entra ID and Keycloak defaults).  JTI replay protection only needs
# to remember tokens for their remaining lifetime; 4h provides a safety margin
# against long-lived tokens and clock skew.
e       /run/prmana/jti         -     -      -      4h   -

# Clean nonce files older than 5 minutes.
# Rationale: exceeds the RFC 9449 §8 nonce TTL (60s used in nonce_cache.rs).
# The 5m window covers: nonce issue → authentication → proof verification, plus
# a generous margin for slow clients.  Short enough to keep the directory small.
e       /run/prmana/nonce       -     -      -      5m   -
