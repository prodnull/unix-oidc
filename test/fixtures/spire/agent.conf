# SPIRE Agent configuration for CI integration tests.
# Connects to the SPIRE server, exposes Workload API on UDS.

agent {
    data_dir = "/opt/spire/data/agent"
    log_level = "INFO"
    server_address = "spire-server"
    server_port = "8081"
    socket_path = "/tmp/spire-agent/public/api.sock"
    trust_domain = "prmana-test"

    # Insecure bootstrap for CI — the server's trust bundle is fetched
    # without verification. Never use this in production.
    insecure_bootstrap = true
}

plugins {
    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "memory" {
        plugin_data {}
    }

    WorkloadAttestor "unix" {
        plugin_data {}
    }
}
