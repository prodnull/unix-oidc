# SPIRE Server configuration for CI integration tests.
# Trust domain: unix-oidc-test (matches docker-compose.spire-test.yaml).

server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    socket_path = "/opt/spire/data/server.sock"
    trust_domain = "unix-oidc-test"
    data_dir = "/opt/spire/data/server"
    log_level = "INFO"

    # Short CA TTL for CI — SVIDs rotate quickly.
    ca_ttl = "1h"
    default_jwt_svid_ttl = "5m"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/opt/spire/data/server/datastore.sqlite3"
        }
    }

    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "memory" {
        plugin_data {}
    }
}
