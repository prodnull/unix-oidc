name: prmana-tools
arch: "${GOARCH}"
platform: linux
version: "1.0.0"
release: "1"
section: admin
priority: optional
maintainer: "prmana Developers <prodnull@users.noreply.github.com>"
description: |
  prmana CLI tools.
  Ships prmana-kubectl, a Kubernetes exec credential plugin that provides
  transparent SSO access to Kubernetes clusters using prmana agent identity.
  Every kubectl command acquires a short-lived (10 min) OIDC token scoped to
  a single cluster audience, issued by the prmana agent after normal SSO login.
  No long-lived credentials stored in kubeconfig.
vendor: "prmana"
homepage: "https://github.com/prodnull/unix-oidc"
license: "CC-BY-NC-SA-4.0"

# prmana-tools has no hard dependency on prmana (kubectl can be used on
# developer laptops where only prmana-agent is installed, not the PAM module).
depends: []

recommends:
  - prmana

contents:
  # GATE: This binary does not exist until DT-A-04 ships prmana-kubectl.
  # Building prmana-tools.deb/.rpm before DT-A-04 completes will fail with
  # a clear nfpm error ("source file not found"). This is expected and
  # intentional. See packaging/README.md §prmana-tools gate.
  - src: target/${RUST_TARGET}/release/prmana-kubectl
    dst: /usr/bin/prmana-kubectl
    file_info:
      mode: 0755

  - src: docs/kubectl-setup.md
    dst: /usr/share/doc/prmana-tools/kubectl-setup.md
    file_info:
      mode: 0644

  - dst: /usr/share/doc/prmana-tools
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root
