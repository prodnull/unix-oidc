name: prmana-scim
arch: "${GOARCH}"
platform: linux
version: "1.0.0"
release: "1"
section: admin
priority: optional
maintainer: "prmana Developers <prodnull@users.noreply.github.com>"
description: |
  prmana SCIM provisioning server.
  Syncs users and groups from your IdP into the local system via SCIM 2.0.
  Requires the prmana package (PAM module + agent daemon) to be installed.
vendor: "prmana"
homepage: "https://github.com/prodnull/unix-oidc"
license: "CC-BY-NC-SA-4.0"

depends:
  - libc6
  - ca-certificates

recommends:
  - prmana

contents:
  - src: target/${RUST_TARGET}/release/prmana-scim
    dst: /usr/bin/prmana-scim
    file_info:
      mode: 0755

  - src: contrib/systemd/prmana-scim.service
    dst: /usr/lib/systemd/system/prmana-scim.service
    file_info:
      mode: 0644

  # Config template — marked config|noreplace so upgrades preserve edits.
  - src: examples/scim.yaml
    dst: /etc/prmana/scim.yaml.example
    type: config|noreplace
    file_info:
      mode: 0644

  - dst: /etc/prmana
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root

scripts:
  postinstall: packaging/scripts/prmana-scim.postinst
  preremove: packaging/scripts/prmana-scim.prerm

overrides:
  rpm:
    depends:
      - ca-certificates
