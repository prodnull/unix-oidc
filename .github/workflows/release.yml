name: Release

on:
  push:
    tags:
      - 'v*'

# Permissions for creating releases, signing, and SLSA attestation
permissions:
  contents: write
  id-token: write    # For Sigstore keyless signing
  attestations: write  # For SLSA build provenance

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (PAM module + agent)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            name: linux-x86_64
            build_pam: true
          # Linux aarch64 (PAM module + agent)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            name: linux-aarch64
            build_pam: true
          # macOS x86_64 (agent only - PAM not supported)
          # Using macos-14 (Apple Silicon) with cross-compilation since macos-13 is retired
          - target: x86_64-apple-darwin
            os: macos-14
            name: macos-x86_64
            build_pam: false
          # macOS Apple Silicon (agent only - PAM not supported)
          - target: aarch64-apple-darwin
            os: macos-14
            name: macos-aarch64
            build_pam: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux x86_64)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libssl-dev libdbus-1-dev pkg-config

      - name: Install cross for aarch64 builds
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release (Linux x86_64 with PAM)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build release (Linux aarch64 with cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build release (macOS agent only)
        if: matrix.build_pam == false
        run: |
          cargo build --release --locked --target ${{ matrix.target }} -p prmana-agent

      - name: Assert test-mode feature is NOT active
        if: matrix.build_pam == true
        env:
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          # Security gate: release binaries must never include test-mode.
          # test-mode bypasses all JWT signature verification.
          PAM_SO="target/${MATRIX_TARGET}/release/libpam_prmana.so"
          if [ ! -f "$PAM_SO" ]; then
            echo "::error::PAM module not found at ${PAM_SO}"
            exit 1
          fi
          # Check for the test-mode sentinel string that only exists when
          # the feature is compiled in (the insecure constructor log message)
          if strings "$PAM_SO" | grep -qi "insecure.*test.*mode\|PRMANA_TEST_MODE\|new_insecure_for_testing"; then
            echo "::error::CRITICAL: Release binary contains test-mode code!"
            echo "::error::The binary was built with --features test-mode."
            echo "::error::This bypasses ALL signature verification."
            exit 1
          fi
          echo "Test-mode gate: PASSED (no test-mode sentinel found in release binary)"

      - name: Generate SBOM
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json
          # Use the main PAM module SBOM
          cp pam-prmana/pam-prmana.cdx.json sbom.json

      - name: Package artifacts
        env:
          REF_NAME: ${{ github.ref_name }}
          MATRIX_NAME: ${{ matrix.name }}
          MATRIX_TARGET: ${{ matrix.target }}
          BUILD_PAM: ${{ matrix.build_pam }}
        run: |
          mkdir -p dist
          # Copy PAM module only for Linux builds
          if [ "${BUILD_PAM}" = "true" ]; then
            cp "target/${MATRIX_TARGET}/release/libpam_prmana.so" dist/ 2>/dev/null || true
          fi
          # Copy agent binary (works on all platforms)
          cp "target/${MATRIX_TARGET}/release/prmana-agent" dist/ 2>/dev/null || true
          cp README.md LICENSE LICENSE-APACHE LICENSE-MIT dist/
          cp sbom.json dist/
          cp -r examples dist/
          cd dist && tar -czvf "../prmana-${REF_NAME}-${MATRIX_NAME}.tar.gz" *

      - name: Generate checksums
        env:
          REF_NAME: ${{ github.ref_name }}
          MATRIX_NAME: ${{ matrix.name }}
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum "prmana-${REF_NAME}-${MATRIX_NAME}.tar.gz" > "prmana-${REF_NAME}-${MATRIX_NAME}.tar.gz.sha256"
          else
            # macOS uses shasum
            shasum -a 256 "prmana-${REF_NAME}-${MATRIX_NAME}.tar.gz" > "prmana-${REF_NAME}-${MATRIX_NAME}.tar.gz.sha256"
          fi

      - name: Generate SLSA provenance (per-build attestation)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: prmana-${{ github.ref_name }}-${{ matrix.name }}.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.name }}
          path: |
            prmana-${{ github.ref_name }}-${{ matrix.name }}.tar.gz
            prmana-${{ github.ref_name }}-${{ matrix.name }}.tar.gz.sha256

      # Upload raw binaries for the package job to consume.
      # Only Linux builds produce the PAM module; macOS builds are agent-only.
      - name: Upload raw binaries for packaging
        if: matrix.build_pam == true
        uses: actions/upload-artifact@v6
        with:
          name: binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/prmana-agent
            target/${{ matrix.target }}/release/libpam_prmana.so
            target/${{ matrix.target }}/release/prmana-audit-verify
            target/${{ matrix.target }}/release/prmana-scim
          retention-days: 1

  package:
    name: Build packages (${{ matrix.pkg_arch }}, ${{ matrix.pkg_type }})
    needs: [build]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: x86_64-unknown-linux-gnu
            pkg_arch: amd64
            pkg_type: deb
            goarch: amd64
            deb_multiarch: x86_64-linux-gnu
          - rust_target: x86_64-unknown-linux-gnu
            pkg_arch: amd64
            pkg_type: rpm
            goarch: x86_64
            deb_multiarch: ""
          - rust_target: aarch64-unknown-linux-gnu
            pkg_arch: arm64
            pkg_type: deb
            goarch: arm64
            deb_multiarch: aarch64-linux-gnu
          - rust_target: aarch64-unknown-linux-gnu
            pkg_arch: arm64
            pkg_type: rpm
            goarch: aarch64
            deb_multiarch: ""
    steps:
      - uses: actions/checkout@v6

      - name: Download binary artifacts
        uses: actions/download-artifact@v6
        with:
          name: binaries-${{ matrix.rust_target }}
          path: target/${{ matrix.rust_target }}/release/

      - name: Fix binary permissions after download
        run: |
          chmod +x \
            target/${{ matrix.rust_target }}/release/prmana-agent \
            target/${{ matrix.rust_target }}/release/prmana-audit-verify \
            target/${{ matrix.rust_target }}/release/prmana-scim \
            2>/dev/null || true

      - name: Install nfpm v2.46.0
        run: |
          NFPM_VERSION=2.46.0
          curl -sfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
              | sudo tar xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Install lint and shell-check tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lintian rpmlint shellcheck gettext-base

      - name: Shellcheck maintainer scripts
        run: shellcheck -s sh packaging/scripts/*.preinst packaging/scripts/*.postinst packaging/scripts/*.prerm packaging/scripts/*.postrm

      - name: Build packages
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
          GOARCH: ${{ matrix.goarch }}
          DEB_PAM_MULTIARCH: ${{ matrix.deb_multiarch }}
          PKG_TYPE: ${{ matrix.pkg_type }}
          PKG_ARCH: ${{ matrix.pkg_arch }}
        run: |
          mkdir -p dist/packages

          build_pkg() {
            local cfg=$1 name=$2
            envsubst < "$cfg" > /tmp/nfpm-expanded.yaml
            if [ "$PKG_TYPE" = "deb" ]; then
              nfpm pkg --packager deb --config /tmp/nfpm-expanded.yaml \
                  --target "dist/packages/${name}_1.0.0_${PKG_ARCH}.deb"
            else
              nfpm pkg --packager rpm --config /tmp/nfpm-expanded.yaml \
                  --target "dist/packages/${name}-1.0.0-1.${GOARCH}.rpm"
            fi
          }

          # Main prmana package: co-installs pam_prmana.so + prmana-agent + systemd units
          build_pkg packaging/nfpm/prmana.yaml prmana

          # SCIM server package
          build_pkg packaging/nfpm/prmana-scim.yaml prmana-scim

          # prmana-tools: gated on DT-A-04 (prmana-kubectl binary must exist first)
          if [ -x "target/${RUST_TARGET}/release/prmana-kubectl" ]; then
            build_pkg packaging/nfpm/prmana-tools.yaml prmana-tools
          else
            echo "skip prmana-tools: prmana-kubectl not built (DT-A-04 not yet shipped)"
          fi

      - name: Lint deb packages
        if: matrix.pkg_type == 'deb'
        run: lintian --profile debian --pedantic dist/packages/*.deb

      - name: Lint rpm packages
        if: matrix.pkg_type == 'rpm'
        run: rpmlint dist/packages/*.rpm || true

      # Security gate: verify PRMANA_TEST_MODE sentinel absent from release binaries.
      # T-DTA02-04: test-mode bypasses ALL JWT signature verification.
      # This is a belt-and-suspenders check — the build job already runs this gate.
      - name: Test-mode sentinel check (prmana-agent)
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          AGENT="target/${RUST_TARGET}/release/prmana-agent"
          if [ ! -f "$AGENT" ]; then
            echo "::error::prmana-agent not found at ${AGENT}"
            exit 1
          fi
          if strings "$AGENT" | grep -qi "insecure.*test.*mode\|PRMANA_TEST_MODE\|new_insecure_for_testing"; then
            echo "::error::CRITICAL: Release binary contains test-mode code!"
            exit 1
          fi
          echo "Test-mode gate: PASSED"

      - name: Smoke test deb install (amd64 only)
        if: matrix.pkg_type == 'deb' && matrix.pkg_arch == 'amd64'
        run: |
          docker run --rm -v "$PWD/dist/packages:/pkg" debian:12-slim bash -c '
            apt-get update -qq && apt-get install -y -qq /pkg/prmana_1.0.0_amd64.deb
            /usr/bin/prmana-agent --version
            test -f /usr/lib/security/pam_prmana.so
            test -f /usr/lib/systemd/system/prmana-agent.service
            test -d /etc/prmana
            getent passwd prmana
            echo "Debian 12 smoke test: PASSED"
          '

      - name: Smoke test rpm install (x86_64 only)
        if: matrix.pkg_type == 'rpm' && matrix.goarch == 'x86_64'
        run: |
          docker run --rm -v "$PWD/dist/packages:/pkg" rockylinux:9 bash -c '
            dnf install -y -q /pkg/prmana-1.0.0-1.x86_64.rpm
            /usr/bin/prmana-agent --version
            test -f /usr/lib64/security/pam_prmana.so
            getent passwd prmana
            echo "Rocky 9 smoke test: PASSED"
          '

      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: packages-${{ matrix.pkg_arch }}-${{ matrix.pkg_type }}
          path: dist/packages/
          retention-days: 7

  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libssl-dev libdbus-1-dev pkg-config

      - name: Run tests
        run: cargo test --all-features

      - name: Security audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, test]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec mv {} release-files/ \;

      - name: Generate consolidated SHA256SUMS
        working-directory: release-files
        run: |
          sha256sum *.tar.gz > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        working-directory: release-files
        run: |
          for tarball in *.tar.gz; do
            cosign sign-blob --yes \
              --output-signature "${tarball}.sig" \
              --output-certificate "${tarball}.pem" \
              "${tarball}"
          done
          # Sign the consolidated checksums file
          cosign sign-blob --yes \
            --output-signature "SHA256SUMS.sig" \
            --output-certificate "SHA256SUMS.pem" \
            "SHA256SUMS"

      - name: Generate release notes
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          if grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1 > release-notes.md
          else
            echo "See CHANGELOG.md for details." > release-notes.md
          fi
          cat >> release-notes.md << 'NOTES'

          ## Verification

          All release artifacts are signed with [Sigstore](https://sigstore.dev) keyless signing
          and include [SLSA](https://slsa.dev) build provenance attestations.

          ### Verify checksums
          ```bash
          sha256sum -c SHA256SUMS
          ```

          ### Verify Sigstore signature
          ```bash
          cosign verify-blob \
            --certificate SHA256SUMS.pem \
            --signature SHA256SUMS.sig \
            --certificate-identity-regexp 'https://github.com/prodnull/unix-oidc' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            SHA256SUMS
          ```

          ### Verify SLSA provenance
          ```bash
          gh attestation verify unix-oidc-*.tar.gz --repo prodnull/unix-oidc
          ```

          See [docs/release-verification.md](docs/release-verification.md) for full details.
          NOTES

          echo "" >> release-notes.md
          echo "## Checksums" >> release-notes.md
          cat release-files/SHA256SUMS >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            release-files/*.tar.gz
            release-files/SHA256SUMS
            release-files/SHA256SUMS.sig
            release-files/SHA256SUMS.pem
            release-files/*.sig
            release-files/*.pem
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
