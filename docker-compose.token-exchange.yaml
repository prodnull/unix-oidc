services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: >
      start-dev
      --import-realm
      --features=token-exchange,admin-fine-grained-authz,dpop
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    volumes:
      - ./test/fixtures/keycloak:/opt/keycloak/data/import:ro
    networks:
      - token-exchange

networks:
  token-exchange:
    driver: bridge
