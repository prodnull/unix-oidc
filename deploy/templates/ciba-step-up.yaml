# Prmana Policy Template: CIBA Sudo Step-Up
#
# Enables IdP-native step-up authentication for sudo via CIBA.
# When a user runs sudo, their phone receives a push notification
# with the command context (when the IdP renders binding_message).
#
# Prerequisites:
# - IdP must support CIBA (Keycloak does natively; others vary)
# - Users must have a registered device for push notifications
#
# This template uses Phase 44 command rules for granular control.
# For a simpler config without per-command rules, see single-issuer.yaml.
#
# Usage: Copy to /etc/unix-oidc/policy.yaml and fill in your values.

issuers:
  - issuer_url: "https://your-idp.example.com/realms/corp"
    client_id: "unix-oidc"
    client_secret: "your-secret-here"  # Required for CIBA (confidential client)
    dpop_enforcement: strict
    # Optional: claim to extract for CIBA login_hint
    # Default: uses Unix username as login_hint
    # ciba_login_hint_claim: "email"
    # Optional: scope for CIBA request
    # ciba_scope: "openid"
    # ACR enforcement for step-up
    acr_mapping:
      required_acr: "urn:mfa"
      acr_claim: "acr"

ssh_login:
  allowed_groups:
    - developers
    - sre-team
    - ops

sudo:
  step_up_required: true
  default_action: step_up

  # Grace period: 5 minutes after a successful step-up
  grace_period_secs: 300

  allowed_methods:
    - push       # CIBA push notification
    - device_flow  # Fallback for IdPs without CIBA

  challenge_timeout: 120

  method_timeouts:
    push: 60
    device_flow: 120

  # Per-command overrides (Phase 44)
  commands:
    # Safe read-only commands: allow without step-up
    - name: "safe-status-checks"
      pattern: "systemctl status *"
      action: allow

    - name: "safe-log-viewing"
      pattern: "journalctl *"
      action: allow

    # Destructive commands: always require fresh challenge (no grace period)
    - name: "service-management"
      pattern: "systemctl restart *"
      action: step_up
      grace_period_secs: 0

break_glass:
  enabled: true
  users:
    - username: breakglass
      password_hash: "$6$rounds=656000$CHANGE_ME"
  alert_on_use: true

security_modes:
  jti_enforcement: warn
  dpop_required: strict
