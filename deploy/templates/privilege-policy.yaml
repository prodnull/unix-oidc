# Prmana Policy Template: Risk-Aware Privilege Policy (Phase 44)
#
# Command-aware sudo policy with allow/step_up/deny actions,
# host sensitivity, per-rule ACR, grace periods, and dry-run mode.
#
# Rules are evaluated top-to-bottom, first match wins.
# If no rule matches, default_action applies.
#
# Usage: Copy to /etc/prmana/policy.yaml and customize.

issuers:
  - issuer_url: "https://your-idp.example.com/realms/corp"
    client_id: "prmana"
    client_secret: "your-secret-here"
    dpop_enforcement: strict
    acr_mapping:
      required_acr: "urn:mfa"
      acr_claim: "acr"

host:
  classification: elevated  # standard | elevated | critical

sudo:
  step_up_required: true
  # Phase 44: explicit default action (overrides legacy step_up_required boolean)
  default_action: step_up  # allow | step_up | deny

  # Grace period: reuse a recent step-up for this many seconds.
  # 0 = every sudo requires a fresh challenge.
  # 300 = after one step-up, subsequent sudos within 5 minutes pass through.
  grace_period_secs: 300

  # Dry-run mode: log what the policy would do without enforcing it.
  # Use this to observe behavior before going live.
  # dry_run: true

  # Allowed step-up methods
  allowed_methods:
    - device_flow
    - push

  challenge_timeout: 120

  method_timeouts:
    fido2: 30
    push: 60
    device_flow: 120

  # ── Command rules (first match wins) ─────────────────────────────────

  commands:
    # Safe read-only commands: allow without step-up
    - name: "read-only-system-info"
      pattern: "systemctl status *"
      action: allow

    - name: "log-viewing"
      pattern: "journalctl *"
      action: allow

    - name: "package-listing"
      pattern: "apt list *"
      action: allow

    - name: "disk-usage"
      pattern: "df *"
      action: allow

    # Service management: require step-up
    - name: "service-restart"
      pattern: "systemctl restart *"
      action: step_up

    - name: "service-stop"
      pattern: "systemctl stop *"
      action: step_up

    # Package installation: require step-up
    - name: "package-install"
      pattern: "apt install *"
      action: step_up

    - name: "package-remove"
      pattern: "apt remove *"
      action: step_up

    # Critical operations: deny outright on elevated/critical hosts
    - name: "deny-reboot-elevated"
      pattern: "reboot"
      action: deny
      host_classification: elevated

    - name: "deny-reboot-critical"
      pattern: "reboot"
      action: deny
      host_classification: critical

    - name: "deny-shutdown"
      pattern: "shutdown *"
      action: deny
      host_classification: critical

    # Dangerous commands: deny everywhere
    - name: "deny-rm-rf-root"
      pattern: "rm -rf /"
      action: deny

    - name: "deny-dd-disk"
      pattern: "dd if=* of=/dev/*"
      action: deny

    # Production database access: step-up with elevated ACR
    - name: "database-access"
      pattern: "psql *"
      action: step_up
      required_acr: "urn:mfa:hw"
      host_classification: critical

    # Firewall changes: step-up with no grace period
    - name: "firewall-changes"
      pattern: "iptables *"
      action: step_up
      grace_period_secs: 0

    - name: "firewall-nft"
      pattern: "nft *"
      action: step_up
      grace_period_secs: 0

  # Group restrictions for sudo
  sudo_groups:
    - sre-team
    - platform-eng

break_glass:
  enabled: true
  accounts:
    - breakglass
  alert_on_use: true

security_modes:
  jti_enforcement: warn
  dpop_required: strict
