# Prmana Agent Config Template: Failover Pair
#
# Client-side agent configuration with primary/secondary IdP failover.
# Place at ~/.config/unix-oidc/config.yaml on user workstations.
#
# Pair with failover-pair.yaml on the server side.

issuer: "https://idp-primary.example.com/realms/corp"
client_id: "unix-oidc"

failover_pairs:
  - primary_issuer_url: "https://idp-primary.example.com/realms/corp"
    secondary_issuer_url: "https://idp-secondary.example.com/realms/corp"
    request_timeout_secs: 10
    cooldown_secs: 60
