---
# tasks/main.yml - Main tasks for prmana role

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - prmana_issuer | length > 0
    fail_msg: "prmana_issuer is required and must be set"
    success_msg: "Required variables validated"

- name: Check prerequisites - curl
  ansible.builtin.command: which curl
  register: curl_check
  changed_when: false
  failed_when: false

- name: Check prerequisites - jq
  ansible.builtin.command: which jq
  register: jq_check
  changed_when: false
  failed_when: false

- name: Install prerequisites on Debian/Ubuntu
  ansible.builtin.apt:
    name:
      - curl
      - jq
    state: present
    update_cache: true
  when:
    - ansible_os_family == "Debian"
    - curl_check.rc != 0 or jq_check.rc != 0
  become: true

- name: Install prerequisites on RHEL/Rocky
  ansible.builtin.dnf:
    name:
      - curl
      - jq
    state: present
  when:
    - ansible_os_family == "RedHat"
    - curl_check.rc != 0 or jq_check.rc != 0
  become: true

- name: Create installation directory
  ansible.builtin.file:
    path: "{{ prmana_install_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Create configuration directory
  ansible.builtin.file:
    path: "{{ prmana_config_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Download prmana installer script
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/prmana/prmana/main/install.sh"
    dest: "{{ prmana_install_dir }}/install.sh"
    mode: "0755"
  become: true

- name: Build installer arguments
  ansible.builtin.set_fact:
    prmana_installer_args: >-
      --issuer "{{ prmana_issuer }}"
      --client-id "{{ prmana_client_id }}"
      {% if prmana_version != "latest" %}--version "{{ prmana_version }}"{% endif %}
      {% if prmana_install_agent %}--install-agent{% endif %}
      {% if prmana_enable_dpop %}--enable-dpop{% endif %}
      {% if prmana_required_acr | length > 0 %}--required-acr "{{ prmana_required_acr }}"{% endif %}
      --non-interactive

- name: Run prmana installer
  ansible.builtin.command:
    cmd: "{{ prmana_install_dir }}/install.sh {{ prmana_installer_args }}"
  register: installer_result
  changed_when: "'already installed' not in installer_result.stdout"
  become: true

- name: Template configuration file
  ansible.builtin.template:
    src: config.env.j2
    dest: "{{ prmana_config_dir }}/config.env"
    mode: "0600"
    owner: root
    group: root
  become: true
  notify: Restart prmana

- name: Configure PAM services
  ansible.builtin.lineinfile:
    path: "/etc/pam.d/{{ item }}"
    line: "auth sufficient pam_prmana.so"
    insertbefore: "^auth"
    state: present
    backup: true
  loop: "{{ prmana_pam_services }}"
  when: prmana_pam_services | length > 0
  become: true
  notify: Restart sshd

- name: Ensure sshd is configured to use PAM
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?UsePAM"
    line: "UsePAM yes"
    state: present
    backup: true
  when: "'sshd' in prmana_pam_services"
  become: true
  notify: Restart sshd

- name: Enable ChallengeResponseAuthentication for SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?ChallengeResponseAuthentication"
    line: "ChallengeResponseAuthentication yes"
    state: present
  when: "'sshd' in prmana_pam_services"
  become: true
  notify: Restart sshd

- name: Enable KbdInteractiveAuthentication for SSH (newer systems)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?KbdInteractiveAuthentication"
    line: "KbdInteractiveAuthentication yes"
    state: present
  when: "'sshd' in prmana_pam_services"
  become: true
  notify: Restart sshd
