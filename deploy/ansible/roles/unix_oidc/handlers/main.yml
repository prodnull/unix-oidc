---
# handlers/main.yml - Handlers for prmana role

- name: Restart sshd
  ansible.builtin.service:
    name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
    state: restarted
  become: true

- name: Restart prmana
  ansible.builtin.service:
    name: prmana
    state: restarted
  become: true
  failed_when: false
