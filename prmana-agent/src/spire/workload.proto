// SPIFFE Workload API — JWT-SVID profile only.
//
// Source: https://github.com/spiffe/spiffe/blob/main/standards/SPIFFE_Workload_API.md
//
// This file is checked in for reference. The Rust stubs in workload_api.rs are
// hand-written from this definition to avoid a build-time protoc dependency.

syntax = "proto3";

package spiffe.workload;

// Minimal subset: only the JWT-SVID RPCs used by SpireSigner.
service SpiffeWorkloadAPI {
    // Fetch JWT-SVIDs for all SPIFFE identities the workload is entitled to,
    // for the requested audience.
    rpc FetchJWTSVID(JWTSVIDRequest) returns (JWTSVIDResponse);

    // Validates a JWT-SVID against the requested audience.
    rpc ValidateJWTSVID(ValidateJWTSVIDRequest) returns (ValidateJWTSVIDResponse);
}

message JWTSVIDRequest {
    // Required. The audience(s) the workload intends to authenticate against.
    repeated string audience = 1;

    // Optional. The requested SPIFFE ID. If unset, SVIDs for all entitled
    // identities are returned.
    string spiffe_id = 2;
}

message JWTSVIDResponse {
    // Required. The list of returned JWT-SVIDs.
    repeated JWTSVID svids = 1;
}

message JWTSVID {
    // Required. The SPIFFE ID of the JWT-SVID.
    string spiffe_id = 1;

    // Required. Encoded JWT using JWS Compact Serialization.
    string svid = 2;

    // Optional. Operator-specified hint for identity disambiguation.
    string hint = 3;
}

message ValidateJWTSVIDRequest {
    // Required. The expected audience.
    string audience = 1;

    // Required. The JWT-SVID to validate.
    string svid = 2;
}

message ValidateJWTSVIDResponse {
    // The SPIFFE ID of the validated JWT-SVID.
    string spiffe_id = 1;

    // The claims from the validated JWT-SVID (Struct = JSON object).
    google.protobuf.Struct claims = 2;
}
